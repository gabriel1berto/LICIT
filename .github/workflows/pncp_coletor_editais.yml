name: PNCP Coletor — Editais (fase 1)

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC (~00h BRT) — reescaneia as 27 UFs pra achar edital novo
  workflow_dispatch:
    inputs:
      uf:
        description: 'UF única (ex: SP) — vazio roda todas as 27'
        required: false
      reset:
        description: 'Reescanear do zero (achar edital novo) em vez de retomar de onde parou'
        type: boolean
        default: false

jobs:
  coleta_editais:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r analise/requirements.txt

      - name: Rodar coletor de editais (fase 1)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: analise
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.uf }}" ]; then
            ARGS="$ARGS --uf ${{ github.event.inputs.uf }}"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.reset }}" = "true" ]; then
            ARGS="$ARGS --reset"
          fi
          python coletor_pncp.py $ARGS
