name: Cotação Master — coleta diária de preço por medida

# Cron ativado 17/jul/2026 (decisão do usuário — expansão de 30 para 98
# medidas, roda sem aprovação manual). 12h UTC = 9h BRT, depois da tarefa
# agendada local do Bransales (6h BRT) — sem dependência real entre as duas
# (escrevem no mesmo banco, horários só evitam sobreposição de log).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: cotacao-master
  cancel-in-progress: false

jobs:
  cotacao_master:
    runs-on: ubuntu-latest
    # Subiu de 120 para 350min em 17/jul/2026 — lista de medidas foi de 30
    # para 98 (3.3x), 120min não é suficiente pros 4 fornecedores rodando em
    # CI (Bransales é local, ver skip abaixo). 350 fica logo abaixo do teto
    # duro de 360min (6h) do GitHub Actions hosted runner, pra terminar com
    # log limpo em vez de ser matado pela plataforma.
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r cotacao_master/requirements.txt

      - name: Instalar Chromium (Playwright)
        run: playwright install --with-deps chromium

      - name: Escrever gp_cookies.json
        run: echo '${{ secrets.GP_COOKIES_JSON }}' > gp_cookies.json

      - name: Rodar cotação master
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRANSALES_EMAIL: ${{ secrets.BRANSALES_EMAIL }}
          BRANSALES_PASSWORD: ${{ secrets.BRANSALES_PASSWORD }}
          CANTU_EMAIL: ${{ secrets.CANTU_EMAIL }}
          CANTU_PASSWORD: ${{ secrets.CANTU_PASSWORD }}
          GREEN_EMAIL: ${{ secrets.GREEN_EMAIL }}
          GREEN_PASSWORD: ${{ secrets.GREEN_PASSWORD }}
        run: python cotacao_master/cotacao_master.py

      - name: Upload debug (só existe se algum scraper quebrou o login)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cotacao-master-debug
          path: |
            cotacao_master/debug_*.png
            cotacao_master/debug_*.html
          if-no-files-found: ignore
          retention-days: 7
